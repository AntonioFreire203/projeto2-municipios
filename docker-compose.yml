services:
  db:
    image: postgres:16-alpine
    container_name: municipios_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-municipios}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-municipios}
      POSTGRES_DB: ${DB_NAME:-municipios}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-municipios} -d ${DB_NAME:-municipios}"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: municipios_cache
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
